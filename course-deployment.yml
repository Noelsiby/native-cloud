apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-course-noel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-course-noel
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-course-noel
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/cloudstudents/noel-course:latest
        imagePullPolicy: Always
        name: app-course-noel
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-course-noel
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-course-noel
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-course-noel
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    alb.ingress.kubernetes.io/group.name: student-app
    alb.ingress.kubernetes.io/healthcheck-path: /noel-student/health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /noel-student
          pathType: Prefix
          backend:
            service:
              name: service-course-noel
              port:
                number: 3001